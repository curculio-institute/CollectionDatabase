name: collection
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - sqlalchemy=2.0.*
  - alembic=1.13.*
  - pytest=8.2.*
  - pytest-cov=5.*
  - pip
  - pip:
      - nicegui==2.*
      - weasyprint==69.*
      # Chromium label-PDF backend (app/services/pdf_backend.py). The pip package is
      # declared here; the browser binary is fetched once by run.py on first launch
      # (pdf_backend.ensure_chromium → `playwright install chromium`) — it is not a
      # pip/conda artifact.
      - playwright==1.*
      - qrcode[pil]==8.*
      - pycountry==26.*
      # Geo mirror → GeoPackage for QGIS (app/services/geo_mirror.py). pyogrio ships GDAL
      # wheels, so no system GDAL is needed.
      - geopandas==1.*
      - pyogrio==0.*
      # System-tray front-end launcher (app/services/tray.py): a no-console way to
      # start/stop the app with an Open/Quit menu. Uses the win32 backend on Windows
      # and the Xorg backend (python-xlib) on Linux; Pillow is already pulled in by
      # qrcode[pil]/weasyprint for the tray icon image.
      - pystray==0.19.*
